name: cocoapods_only_plugin
description: A minimal CocoaPods-only Flutter plugin for testing hybrid SPM/CocoaPods scenarios.
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.7.0
  flutter: ">=3.24.0"

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: CocoapodsOnlyPlugin

dependencies:
  flutter:
    sdk: flutter
